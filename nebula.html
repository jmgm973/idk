<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: radial-gradient(ellipse at center, #0a0015 0%, #000000 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            padding-top: 100px;
        }

        .container {
            text-align: center;
            position: relative;
            margin-bottom: 40px;
        }

        .nebula-text {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            background: linear-gradient(
                90deg,
                #ff00ff 0%,
                #ff1493 25%,
                #0066ff 50%,
                #9933ff 75%,
                #ff00ff 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shineAcross 8s linear infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 255, 0.6)) 
                    drop-shadow(0 0 60px rgba(0, 102, 255, 0.4))
                    drop-shadow(0 0 90px rgba(153, 51, 255, 0.3));
            text-shadow: 0 0 40px rgba(255, 0, 255, 0.5),
                         0 0 80px rgba(0, 102, 255, 0.3);
        }

        @keyframes shineAcross {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .glow-container {
            position: relative;
            display: inline-block;
        }

        .glow-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(255, 0, 255, 0.3) 0%, transparent 70%);
            filter: blur(80px);
            pointer-events: none;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* Search Bar Styling */
        .search-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .search-bar {
            width: 500px;
            padding: 15px 25px;
            font-size: 16px;
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 50px;
            background: rgba(20, 20, 40, 0.7);
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2),
                        inset 0 0 20px rgba(0, 102, 255, 0.1);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-bar:focus {
            border-color: rgba(255, 0, 255, 0.8);
            background: rgba(20, 20, 40, 0.9);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5),
                        0 0 60px rgba(0, 102, 255, 0.3),
                        inset 0 0 30px rgba(0, 102, 255, 0.2);
            transform: scale(1.02);
        }

        .search-bar:hover {
            border-color: rgba(255, 0, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3),
                        0 0 50px rgba(0, 102, 255, 0.2);
        }

        /* Quick Apps Section */
        .quick-apps {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .app-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: rgba(30, 20, 50, 0.5);
            border: 2px solid rgba(255, 0, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            min-width: 150px;
            text-align: center;
        }

        .app-tile:hover {
            background: rgba(30, 20, 50, 0.8);
            border-color: rgba(255, 0, 255, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4),
                        0 0 60px rgba(0, 102, 255, 0.2);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.5));
        }

        .app-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #ff00ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-badges {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        .badge {
            font-size: 11px;
            padding: 4px 8px;
            background: rgba(0, 255, 150, 0.1);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 8px;
            color: #00ff96;
            font-weight: 600;
        }

        /* Chat Modal */
        .chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .chat-window {
            width: 100%;
            max-width: 700px;
            height: 600px;
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.95) 0%, rgba(10, 5, 25, 0.95) 100%);
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.3),
                        0 0 100px rgba(0, 102, 255, 0.2);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.1) 0%, rgba(0, 102, 255, 0.1) 100%);
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff00ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ff00ff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            color: #0066ff;
            filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.5));
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 0, 255, 0.1);
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff00ff, #0066ff);
            border-radius: 10px;
        }

        .message {
            display: flex;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.3), rgba(0, 102, 255, 0.3));
            border: 1px solid rgba(255, 0, 255, 0.5);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .message.ai .message-content {
            background: rgba(0, 255, 150, 0.1);
            border: 1px solid rgba(0, 255, 150, 0.3);
            color: #00ff96;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #00ff96;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .chat-input-area {
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.05) 0%, rgba(0, 102, 255, 0.05) 100%);
            border-top: 1px solid rgba(255, 0, 255, 0.2);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 20px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-input:focus {
            border-color: rgba(255, 0, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .send-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #ff00ff, #0066ff);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Floating particles effect */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ff00ff, transparent);
            border-radius: 50%;
            opacity: 0.6;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(1);
                opacity: 0;
            }
            5% {
                opacity: 0.6;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(0);
                opacity: 0;
            }
        }

        /* Starfield background */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Starfield background -->
    <div class="starfield" id="starfield"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main container -->
    <div class="container">
        <div class="glow-container">
            <div class="glow-background"></div>
            <h1 class="nebula-text">NEBULA</h1>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <input 
                type="text" 
                class="search-bar" 
                id="searchInput" 
                placeholder="Search the cosmos..."
                autocomplete="off"
            />
        </div>

        <!-- Quick Apps -->
        <div class="quick-apps">
            <div class="app-tile" id="nebulaAssistantTile">
                <div class="app-icon">👨‍🚀</div>
                <div class="app-title">Nebula Assistant</div>
                <div class="app-badges">
                    <div class="badge">No sign in</div>
                    <div class="badge">100% Free</div>
                    <div class="badge">No limits</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Modal -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-window">
            <div class="chat-header">
                <div class="chat-header-title">👨‍🚀 Nebula Assistant</div>
                <button class="close-btn" id="closeChat">&times;</button>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="chat-input-area">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Ask Nebula Assistant anything..."
                    autocomplete="off"
                />
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Create starfield
        const starfield = document.getElementById('starfield');
        
        function createStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starfield.appendChild(star);
            }
        }

        createStars();

        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 8 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            const startX = Math.random() * window.innerWidth;
            particle.style.left = startX + 'px';
            
            const duration = Math.random() * 3 + 4;
            particle.style.animationDuration = duration + 's';
            
            const delay = Math.random() * 2;
            particle.style.animationDelay = delay + 's';
            
            const colors = [
                'rgba(255, 0, 255, 0.8)',
                'rgba(255, 20, 147, 0.8)',
                'rgba(0, 102, 255, 0.8)',
                'rgba(153, 51, 255, 0.8)'
            ];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.background = `radial-gradient(circle, ${randomColor}, transparent)`;
            
            particlesContainer.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, (duration + delay) * 1000);
        }

        setInterval(createParticle, 200);

        for (let i = 0; i < 30; i++) {
            setTimeout(createParticle, i * 100);
        }

        // Search functionality
        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const searchQuery = searchInput.value.trim();
                if (searchQuery) {
                    const duckDuckGoUrl = `https://duckduckgo.com/?q=${encodeURIComponent(searchQuery)}`;
                    window.open(duckDuckGoUrl, '_blank');
                    searchInput.value = '';
                }
            }
        });

        // Chat functionality
        const chatModal = document.getElementById('chatModal');
        const nebulaAssistantTile = document.getElementById('nebulaAssistantTile');
        const closeChat = document.getElementById('closeChat');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messagesContainer');

        const conversationHistory = [];

        nebulaAssistantTile.addEventListener('click', () => {
            chatModal.classList.add('active');
            chatInput.focus();
            if (messagesContainer.children.length === 0) {
                addMessage('Welcome to Nebula Assistant! 👨‍🚀 I\'m here to help you with anything you need. Ask me anything - no limits, completely free!', 'ai');
            }
        });

        closeChat.addEventListener('click', () => {
            chatModal.classList.remove('active');
        });

        chatModal.addEventListener('click', (e) => {
            if (e.target === chatModal) {
                chatModal.classList.remove('active');
            }
        });

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typing-indicator';
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                typingDiv.appendChild(dot);
            }
            
            messageDiv.appendChild(typingDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            chatInput.value = '';
            conversationHistory.push({ role: 'user', content: message });

            addTypingIndicator();

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'YOUR_API_KEY_HERE',
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 1024,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                const aiMessage = data.content[0].text;

                removeTypingIndicator();
                addMessage(aiMessage, 'ai');
                conversationHistory.push({ role: 'assistant', content: aiMessage });
            } catch (error) {
                removeTypingIndicator();
                const fallbackResponse = 'I\'m currently powered by an API integration. To use me fully, please add your API key. For now, I can help you explore the Nebula! 🌌';
                addMessage(fallbackResponse, 'ai');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
